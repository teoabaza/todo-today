# Nixpacks configuration for Coolify
# Ensures Prisma client is generated before the TypeScript build,
# and that the correct Node version is used.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate", "npm run build"]

[start]
cmd = "npx prisma migrate deploy && node dist/index.js"
